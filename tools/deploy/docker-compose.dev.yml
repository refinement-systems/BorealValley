services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${BV_DEV_DB_USER:-app}
      POSTGRES_PASSWORD: ${BV_DEV_DB_PASSWORD:-app_pw}
      POSTGRES_DB: ${BV_DEV_DB_NAME:-app_db}
    ports:
      - "${BV_DEV_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${BV_DEV_DB_USER:-app} -d ${BV_DEV_DB_NAME:-app_db}
      interval: 3s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ${BV_DEV_REPO_ROOT:-.}
      dockerfile: tools/deploy/Dockerfile.dev
      target: ${BV_DEV_DOCKER_TARGET:-dev-runtime}
    working_dir: /workspace
    environment:
      BV_PG_DSN: postgres://${BV_DEV_DB_USER:-app}:${BV_DEV_DB_PASSWORD:-app_pw}@db:5432/${BV_DEV_DB_NAME:-app_db}?sslmode=disable
      BV_ROOT: ${BV_DEV_CONTAINER_ROOT:-/work}
      BV_DEV_CONTAINER_PORT: ${BV_DEV_CONTAINER_PORT:-4000}
      BV_DEV_MODE: ${BV_DEV_MODE:-parity}
      BV_REPO_PATH_MAP_FROM: ${BV_REPO_PATH_MAP_FROM:-}
      BV_REPO_PATH_MAP_TO: ${BV_REPO_PATH_MAP_TO:-}
    ports:
      - "${BV_DEV_HOST_PORT:-4000}:${BV_DEV_CONTAINER_PORT:-4000}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - "${BV_DEV_REPO_ROOT:-.}:/workspace"
      - "${BV_DEV_ROOT_HOST:-.}:${BV_DEV_CONTAINER_ROOT:-/work}"
    command: >-
      bash -c '
        set -euo pipefail
        if [[ "$$BV_DEV_MODE" == "fast" ]]; then
          go run ./src/cmd/ctl init-root --root "$$BV_ROOT"
        else
          /app/BorealValley-ctl init-root --root "$$BV_ROOT"
        fi
        if ! grep -Eq "\"port\"[[:space:]]*:[[:space:]]*$$BV_DEV_CONTAINER_PORT" "$$BV_ROOT/config.json"; then
          echo "error: $$BV_ROOT/config.json must use port $$BV_DEV_CONTAINER_PORT for this dev container." >&2
          exit 1
        fi
        if [[ "$$BV_DEV_MODE" == "fast" ]]; then
          exec go run ./src/cmd/web serve --root "$$BV_ROOT" --env dev
        fi
        exec /app/BorealValley-web serve --root "$$BV_ROOT" --env dev
      '

volumes:
  pgdata:
