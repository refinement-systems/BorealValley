{{define "title"}}Tickets{{end}}
{{define "content"}}
      <section class="page-card"><header class="page-header"><h1 class="page-title">Tickets</h1></header>{{if .Err}}<p class="message-banner message-banner--error">{{.Err}}</p>{{end}}</section>{{if .Tickets}}<section class="section-card"><table class="data-table"><thead><tr><th>Name</th><th>Tracker</th><th>Repository</th></tr></thead><tbody>{{range .Tickets}}<tr><td><a href="/ticket-tracker/{{.TrackerSlug}}/ticket/{{.Slug}}">{{if .Summary}}{{.Summary}}{{else}}{{.Slug}}{{end}}</a></td><td>{{.TrackerSlug}}</td><td>{{.RepositorySlug}}</td></tr>{{end}}</tbody></table></section>{{else}}<section class="section-card"><p class="muted-text">No tickets found.</p></section>{{end}}
{{end}}
