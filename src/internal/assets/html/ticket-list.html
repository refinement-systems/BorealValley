<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><link rel="stylesheet" href="/static/css/catppuccin.css" /><link rel="stylesheet" href="/static/css/app.css" /><title>Tickets</title></head><body class="page page--tickets"><main class="page-shell"><section class="page-card"><header class="page-header"><h1 class="page-title">Tickets</h1></header>{{if .Err}}<p class="message-banner message-banner--error">{{.Err}}</p>{{end}}</section>{{if .Tickets}}<section class="section-card"><table class="data-table"><thead><tr><th>Name</th><th>Tracker</th><th>Repository</th></tr></thead><tbody>{{range .Tickets}}<tr><td><a href="/ticket-tracker/{{.TrackerSlug}}/ticket/{{.Slug}}">{{if .Summary}}{{.Summary}}{{else}}{{.Slug}}{{end}}</a></td><td>{{.TrackerSlug}}</td><td>{{.RepositorySlug}}</td></tr>{{end}}</tbody></table></section>{{else}}<section class="section-card"><p class="muted-text">No tickets found.</p></section>{{end}}<nav class="link-row"><a href="/web/admin">Admin home</a></nav></main></body></html>
