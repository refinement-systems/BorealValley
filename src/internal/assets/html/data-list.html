{{define "title"}}Repositories{{end}}
{{define "content"}}
      <section class="page-card"><header class="page-header"><h1 class="page-title">Repositories</h1></header>{{if .Err}}<p class="message-banner message-banner--error">{{.Err}}</p>{{end}}{{if .Repositories}}<ul class="item-list">{{range .Repositories}}<li class="list-card"><a class="repo-link" href="/web/repo/{{.Slug}}">{{.Slug}}</a> <code class="repo-path">{{.Path}}</code></li>{{end}}</ul>{{else}}<p class="muted-text">No repositories found.</p>{{end}}</section>
{{end}}
