{{define "title"}}User Actor{{end}}
{{define "content"}}
      <section class="page-card">
        <header class="page-header">
          <h1 class="page-title">User Actor</h1>
          <p class="page-subtitle">Rendered actor details for <strong>{{.Username}}</strong>.</p>
        </header>
        <ul class="meta-list">
          <li class="meta-item"><strong>Username:</strong> {{.Username}}</li>
        </ul>
      </section>
      <section class="json-panel">
        <details class="json-details">
          <summary class="details-toggle">Actor JSON</summary>
          <pre class="json-block">{{.ActorJSON}}</pre>
        </details>
      </section>
{{end}}
