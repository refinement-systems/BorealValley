<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><link rel="stylesheet" href="/static/css/catppuccin.css" /><link rel="stylesheet" href="/static/css/app.css" /><title>Login</title></head>
  <body class="page page--login"><main class="page-shell"><section class="page-card"><header class="page-header"><h1 class="page-title">Login</h1></header>{{if .Err}}<p class="message-banner message-banner--error">{{.Err}}</p>{{end}}<form class="form-stack" method="POST" action="/web/login"><input type="hidden" name="return_to" value="{{.ReturnTo}}"><label class="field-group"><span class="field-label">Username</span><input class="input-text" name="username" autocomplete="username" required></label><label class="field-group"><span class="field-label">Password</span><input class="input-password" type="password" name="password" autocomplete="current-password" required></label><div><button type="submit">Login</button></div></form></section></main></body>
</html>
